<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Medicos — Caly Vision Ótica</title></head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="page-title mb-0">Medicos</h4>
        <a th:href="@{/medicos/novo}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg"></i> Novo medico
        </a>
    </div>
    <div class="table-responsive">
        <table class="table table-hover table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Nome</th>
                    <th>CRM</th>
                    <th>Telefone</th>
                    <th class="text-center" style="width:120px">Acoes</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(medicos)}">
                    <td colspan="4" class="text-center text-muted">Nenhum medico cadastrado.</td>
                </tr>
                <tr th:each="m : ${medicos}">
                    <td th:text="${m.nome}"></td>
                    <td th:text="${m.crm}"></td>
                    <td th:text="${m.telefone}"></td>
                    <td class="text-center">
                        <a th:href="@{/medicos/{id}/editar(id=${m.id})}"
                           class="btn btn-sm btn-outline-primary">Editar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
