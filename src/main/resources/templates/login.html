<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — Caly Vision Ótica</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Caly Vision identidade visual -->
    <link rel="stylesheet" href="/css/caly.css">
</head>
<body class="caly-login-bg d-flex align-items-center justify-content-center">

<div style="width:100%;max-width:420px;padding:1rem">
    <div class="card caly-login-card">

        <!-- Cabeçalho com marca -->
        <div class="caly-login-header">
            <!-- Glasses icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="58" height="34" viewBox="0 0 80 46"
                 fill="none" class="caly-glasses-icon mb-2" aria-hidden="true">
                <rect x="2"  y="4" width="30" height="20" rx="10" ry="10" stroke="white" stroke-width="4"/>
                <rect x="48" y="4" width="30" height="20" rx="10" ry="10" stroke="white" stroke-width="4"/>
                <line x1="32" y1="14" x2="48" y2="14" stroke="white" stroke-width="3.5"/>
                <line x1="2"  y1="14" x2="0"  y2="8"  stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="78" y1="14" x2="80" y2="8"  stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
            <div class="brand-name">Caly <span>Vision</span></div>
            <div class="brand-sub">Ótica</div>
        </div>

        <div class="card-body">

            <div th:if="${bloqueado}" class="alert alert-danger py-2">
                <i class="bi bi-shield-lock me-1"></i> <span th:text="${bloqueado}"></span>
            </div>
            <div th:if="${param.erro}" class="alert alert-danger py-2">
                <i class="bi bi-exclamation-circle me-1"></i> E-mail ou senha incorretos.
            </div>
            <div th:if="${param.saiu}" class="alert alert-info py-2">
                <i class="bi bi-info-circle me-1"></i> Você saiu do sistema.
            </div>
            <div th:if="${param.sessaoExpirada}" class="alert alert-warning py-2">
                <i class="bi bi-clock-history me-1"></i> Sua sessão expirou. Faça login novamente.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold small">E-mail</label>
                    <input type="email" id="username" name="username"
                           class="form-control" required autofocus>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold small">Senha</label>
                    <input type="password" id="password" name="password"
                           class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
