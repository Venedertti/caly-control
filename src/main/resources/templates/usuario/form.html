<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Usuario — Caly Vision Ótica</title></head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="page-title mb-0" th:text="${usuario.id == null} ? 'Novo Usuario' : 'Editar Usuario'"></h4>
        <a th:href="@{/usuarios}" class="btn btn-sm btn-outline-secondary">Voltar</a>
    </div>
    <div class="card" style="max-width:500px">
        <div class="card-body">
            <form th:action="${usuario.id == null} ? @{/usuarios} : @{/usuarios/{id}(id=${usuario.id})}"
                  th:object="${usuario}" method="post">
                <div class="mb-3">
                    <label class="form-label">Nome *</label>
                    <input type="text" th:field="*{nome}" class="form-control"
                           th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:errors="*{nome}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail *</label>
                    <input type="email" th:field="*{email}" class="form-control"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" required>
                    <div class="invalid-feedback" th:errors="*{email}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha *</label>
                    <input type="password" th:field="*{senhaHash}" class="form-control" required>
                    <div class="form-text" th:if="${usuario.id != null}">
                        Preencha apenas para alterar a senha atual.
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Perfil *</label>
                    <select th:field="*{perfil}" class="form-select" required>
                        <option value="">Selecione...</option>
                        <option th:each="p : ${perfis}" th:value="${p}" th:text="${p}"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a th:href="@{/usuarios}" class="btn btn-outline-secondary ms-2">Cancelar</a>
            </form>
        </div>
    </div>
</section>
</body>
</html>
