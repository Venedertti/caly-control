<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head><title>Usuarios — Caly Vision Ótica</title></head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="page-title mb-0">Usuarios</h4>
        <a th:href="@{/usuarios/novo}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg"></i> Novo usuario
        </a>
    </div>
    <div class="table-responsive">
        <table class="table table-hover table-bordered">
            <thead class="table-light">
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Perfil</th>
                    <th class="text-center" style="width:160px">Acoes</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(usuarios)}">
                    <td colspan="4" class="text-center text-muted">Nenhum usuario ativo.</td>
                </tr>
                <tr th:each="u : ${usuarios}">
                    <td th:text="${u.nome}"></td>
                    <td th:text="${u.email}"></td>
                    <td><span class="badge text-bg-secondary" th:text="${u.perfil}"></span></td>
                    <td class="text-center">
                        <a th:href="@{/usuarios/{id}/editar(id=${u.id})}"
                           class="btn btn-sm btn-outline-primary">Editar</a>
                        <form th:action="@{/usuarios/{id}/desativar(id=${u.id})}"
                              method="post" class="d-inline"
                              onsubmit="return confirm('Desativar este usuario?')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">Remover</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
