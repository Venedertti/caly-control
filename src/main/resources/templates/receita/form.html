<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Receita — Caly Vision Ótica</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="page-title mb-0"
            th:text="${receita.id == null} ? 'Nova Receita' : 'Editar Receita'"></h4>
        <a th:href="@{/receitas}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Voltar
        </a>
    </div>

    <form th:action="${receita.id == null} ? @{/receitas} : @{/receitas}"
          th:object="${receita}" method="post">

        <div class="row g-3">

            <!-- Cliente e Médico -->
            <div class="col-md-6">
                <label class="form-label fw-semibold">Cliente *</label>
                <select class="form-select" th:field="*{cliente.id}" required>
                    <option value="">Selecione o cliente</option>
                    <option th:each="c : ${clientes}"
                            th:value="${c.id}"
                            th:text="${c.nome}"></option>
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-semibold">Médico *</label>
                <select class="form-select" th:field="*{medico.id}" required>
                    <option value="">Selecione o médico</option>
                    <option th:each="m : ${medicos}"
                            th:value="${m.id}"
                            th:text="${'Dr(a). ' + m.nome + ' — CRM ' + m.crm}"></option>
                </select>
            </div>

            <!-- Datas -->
            <div class="col-md-4">
                <label class="form-label fw-semibold">Data de emissão *</label>
                <input type="date" class="form-control" th:field="*{dataEmissao}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Validade *</label>
                <input type="date" class="form-control" th:field="*{validade}" required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Adição</label>
                <input type="number" class="form-control" th:field="*{adicao}"
                       step="0.25" min="-20" max="20" placeholder="0.00">
            </div>

            <!-- DP -->
            <div class="col-md-3">
                <label class="form-label fw-semibold">DP OD (mm)</label>
                <input type="number" class="form-control" th:field="*{dpOd}"
                       step="0.5" min="20" max="40" placeholder="ex: 32.0">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-semibold">DP OE (mm)</label>
                <input type="number" class="form-control" th:field="*{dpOe}"
                       step="0.5" min="20" max="40" placeholder="ex: 32.0">
            </div>

            <!-- Prescrição OD -->
            <div class="col-12">
                <div class="card">
                    <div class="card-header fw-semibold">
                        <i class="bi bi-eye me-1"></i>Olho Direito (OD)
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Esférico</label>
                                <input type="number" class="form-control" th:field="*{odEsf}"
                                       step="0.25" min="-20" max="20" placeholder="ex: -2.50">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Cilíndrico</label>
                                <input type="number" class="form-control" th:field="*{odCil}"
                                       step="0.25" min="-10" max="10" placeholder="ex: -0.75">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Eixo (°)</label>
                                <input type="number" class="form-control" th:field="*{odEixo}"
                                       min="0" max="180" placeholder="ex: 90">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Prescrição OE -->
            <div class="col-12">
                <div class="card">
                    <div class="card-header fw-semibold">
                        <i class="bi bi-eye me-1"></i>Olho Esquerdo (OE)
                    </div>
                    <div class="card-body">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label">Esférico</label>
                                <input type="number" class="form-control" th:field="*{oeEsf}"
                                       step="0.25" min="-20" max="20" placeholder="ex: -2.25">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Cilíndrico</label>
                                <input type="number" class="form-control" th:field="*{oeCil}"
                                       step="0.25" min="-10" max="10" placeholder="ex: -0.50">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Eixo (°)</label>
                                <input type="number" class="form-control" th:field="*{oeEixo}"
                                       min="0" max="180" placeholder="ex: 85">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Observações -->
            <div class="col-12">
                <label class="form-label fw-semibold">Observações</label>
                <textarea class="form-control" th:field="*{observacoes}" rows="3"
                          maxlength="500" placeholder="Informações adicionais..."></textarea>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Salvar Receita
                </button>
            </div>
        </div>
    </form>
</section>
</body>
</html>
