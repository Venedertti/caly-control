<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:replace="${title}">Caly Vision Ótica</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <!-- Caly Vision identidade visual -->
    <link rel="stylesheet" th:href="@{/css/caly.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg caly-navbar">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <!-- Glasses inline SVG mini icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="20" viewBox="0 0 64 46" fill="none" aria-hidden="true">
                <rect x="1" y="6" width="26" height="18" rx="9" ry="9" stroke="white" stroke-width="4"/>
                <rect x="37" y="6" width="26" height="18" rx="9" ry="9" stroke="white" stroke-width="4"/>
                <line x1="27" y1="15" x2="37" y2="15" stroke="white" stroke-width="3.5"/>
                <line x1="1"  y1="15" x2="0"  y2="10" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="63" y1="15" x2="64" y2="10" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            </svg>
            <span>
                <span class="brand-caly">Caly</span><span class="brand-vision"> Vision</span>
                <span class="brand-sub">Ótica</span>
            </span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/os}">
                        <i class="bi bi-wrench-adjustable me-1"></i>OS
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/vendas}">
                        <i class="bi bi-cart3 me-1"></i>Vendas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/receitas}">
                        <i class="bi bi-eyeglasses me-1"></i>Receitas
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/clientes}">
                        <i class="bi bi-people me-1"></i>Clientes
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/medicos}">
                        <i class="bi bi-heart-pulse me-1"></i>Médicos
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/fornecedores}">
                        <i class="bi bi-truck me-1"></i>Fornecedores
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/produtos}">
                        <i class="bi bi-box-seam me-1"></i>Produtos
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios}">
                        <i class="bi bi-person-gear me-1"></i>Usuários
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav align-items-center gap-2">
                <li class="nav-item">
                    <span class="nav-link text-light opacity-75" sec:authentication="name"></span>
                </li>
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm btn-outline-light">
                            <i class="bi bi-box-arrow-right me-1"></i>Sair
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid mt-3">
    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i><span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <th:block th:replace="${content}"/>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
