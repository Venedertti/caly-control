<!DOCTYPE html>
<html lang="pt-BR"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::title}, ~{::section})}">
<head>
    <title>Ordens de Serviço — Caly Vision Ótica</title>
</head>
<body>
<section>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 class="page-title mb-0">Ordens de Serviço</h4>
        <a sec:authorize="hasAnyRole('ADMIN','VENDEDOR')"
           th:href="@{/os/nova}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-lg me-1"></i>Nova OS
        </a>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Número</th>
                        <th>Cliente</th>
                        <th>Abertura</th>
                        <th>Previsão</th>
                        <th class="text-center">Status</th>
                        <th class="text-end">Total</th>
                        <th class="text-end">Pago</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${#lists.isEmpty(ordens)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            Nenhuma OS cadastrada.
                        </td>
                    </tr>
                    <tr th:each="o : ${ordens}"
                        style="cursor:pointer"
                        th:onclick="|window.location='@{/os/{id}(id=${o.id})}'|">
                        <td class="font-monospace small fw-semibold" th:text="${o.numeroOs}"></td>
                        <td th:text="${o.cliente.nome}"></td>
                        <td class="text-nowrap small"
                            th:text="${#temporals.format(o.dataAbertura, 'dd/MM/yyyy')}"></td>
                        <td class="text-nowrap small"
                            th:text="${o.dataPrevisao != null ? #temporals.format(o.dataPrevisao, 'dd/MM/yyyy') : '—'}"></td>
                        <td class="text-center">
                            <span class="badge"
                                  th:classappend="${o.status.name() == 'ABERTA'}       ? 'bg-primary'
                                               : (${o.status.name() == 'EM_PRODUCAO'} ? 'bg-warning text-dark'
                                               : (${o.status.name() == 'PRONTA'}      ? 'bg-info text-dark'
                                               : (${o.status.name() == 'ENTREGUE'}    ? 'bg-success'
                                               : 'bg-danger')))"
                                  th:text="${o.status.descricao}"></span>
                        </td>
                        <td class="text-end fw-semibold text-nowrap"
                            th:text="${'R$ ' + #numbers.formatDecimal(o.valorTotal, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td class="text-end text-nowrap"
                            th:text="${'R$ ' + #numbers.formatDecimal(o.valorPago, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td class="text-end" onclick="event.stopPropagation()">
                            <a th:href="@{/os/{id}(id=${o.id})}" class="btn btn-sm btn-outline-secondary py-0">
                                <i class="bi bi-eye"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</section>
</body>
</html>
